specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: TiKV
providerId: tikv
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Database
  - Open Source
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for TiKV: an Apache 2.0 open-source distributed key-value store with
  no software-license cost. FinOps focus is on the underlying infrastructure spend (compute, storage,
  network) the operator runs the cluster on, not on a vendor invoice.'
sources:
  - https://github.com/tikv/tikv
  - https://focus.finops.org/focus-specification/v1-3/
notes: TiKV has no commercial product or vendor invoice. FinOps observability lives in the host cloud
  (AWS/GCP/Azure FOCUS exports) and the operator's own platform telemetry.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: TiKV Authors / CNCF
serviceCategory: Database
billingModel:
  pricingCategory: Open Source / No Vendor Bill
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories: []
focusColumns:
  ServiceName: TiKV
  ServiceCategory: Database
  ProviderName: TiKV (CNCF)
  PublisherName: TiKV Authors
  BillingCurrency: USD
meters:
  - name: tikv_node_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cluster
      - host
      - region
  - name: tikv_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - cluster
      - region
principles:
  - name: Visibility
    description: TiKV emits no vendor invoice — pull cluster cost from the underlying cloud's FOCUS export
      (AWS CUR 2.0, GCP Billing, Azure Cost Management) tagged with the TiKV cluster name.
  - name: Allocation
    description: Tag every TiKV node, PV, and load balancer with the owning team so cluster cost rolls
      up to the data-platform group rather than landing in a generic infrastructure bucket.
  - name: Optimization
    description: Right-size TiKV node counts based on Region count, replica factor, and gRPC concurrency;
      use storage classes that match access patterns; consolidate small clusters where consistency boundaries
      allow.
  - name: Accountability
    description: A platform owner is accountable for cluster sizing, upgrade cadence, and any third-party
      support contract (e.g. PingCAP) used to operate TiKV.
maintainers:
