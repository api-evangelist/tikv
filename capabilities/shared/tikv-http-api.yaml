naftiko: "1.0.0-alpha1"

info:
  label: "TiKV HTTP Management API"
  description: >-
    TiKV's HTTP management API for node status, configuration management,
    Prometheus metrics, and region inspection.
  tags:
    - TiKV
    - Database
    - Distributed Systems
    - Monitoring
    - Operations
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIKV_NODE_HOST: TIKV_NODE_HOST

capability:
  consumes:
    - type: http
      namespace: tikv-http
      baseUri: "http://{{TIKV_NODE_HOST}}:20160"
      description: "TiKV HTTP management API"
      resources:
        - name: status
          path: /status
          description: "Node status and health"
          operations:
            - name: get-status
              method: GET
              description: "Get TiKV node status and version information"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: metrics
          path: /metrics
          description: "Prometheus metrics"
          operations:
            - name: get-metrics
              method: GET
              description: "Get Prometheus metrics for the TiKV node"
              outputRawFormat: text
              outputParameters:
                - name: result
                  type: string
                  value: "$."
        - name: config
          path: /config
          description: "Configuration management"
          operations:
            - name: get-config
              method: GET
              description: "Get TiKV node runtime configuration"
              inputParameters:
                - name: section
                  in: query
                  type: string
                  required: false
                - name: key
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-config
              method: POST
              description: "Update TiKV node runtime configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  config: "{{tools.config}}"
        - name: regions
          path: /regions/meta
          description: "Region inspection"
          operations:
            - name: get-all-regions-meta
              method: GET
              description: "Get metadata for all Raft regions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tikv-management-rest
      resources:
        - path: /v1/status
          name: status
          operations:
            - method: GET
              name: get-status
              description: "Get TiKV node status"
              call: "tikv-http.get-status"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/metrics
          name: metrics
          operations:
            - method: GET
              name: get-metrics
              description: "Get Prometheus metrics"
              call: "tikv-http.get-metrics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/config
          name: config
          operations:
            - method: GET
              name: get-config
              description: "Get TiKV configuration"
              call: "tikv-http.get-config"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/regions
          name: regions
          operations:
            - method: GET
              name: get-all-regions-meta
              description: "Get all Raft regions metadata"
              call: "tikv-http.get-all-regions-meta"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tikv-management-mcp
      transport: http
      tools:
        - name: get-status
          description: "Get TiKV node status and version information"
          hints:
            readOnly: true
            idempotent: true
          call: "tikv-http.get-status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-metrics
          description: "Get Prometheus metrics for a TiKV node"
          hints:
            readOnly: true
            idempotent: true
          call: "tikv-http.get-metrics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-config
          description: "Get TiKV node runtime configuration"
          hints:
            readOnly: true
            idempotent: true
          call: "tikv-http.get-config"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-all-regions-meta
          description: "Get metadata for all Raft regions on a TiKV node"
          hints:
            readOnly: true
            idempotent: true
          call: "tikv-http.get-all-regions-meta"
          outputParameters:
            - type: object
              mapping: "$."
