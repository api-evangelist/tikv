specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: TiKV
providerId: tikv
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Database
  - Open Source
  - Rate Limiting
description: TiKV is a self-hosted open-source database; there is no vendor-imposed rate-limit surface.
  Throughput, concurrency, and quota controls are implemented operationally by the customer through
  TiKV configuration (server.grpc-concurrency, scheduler-concurrency), client connection pooling, and
  any upstream gateway the operator places in front of the cluster.
sources:
  - https://github.com/tikv/tikv
notes: TiKV ships no SaaS — there are no provider rate limits to publish. Operators tune limits in TiKV
  configuration and at the application/gateway layer.
limits:
  - name: Operator-Configured Throughput
    scope: cluster
    metric: varies
    limit: see operator configuration
policies:
  - name: Self-Hosted Operation
    description: TiKV is consumed via self-deployment. There is no vendor account, no API gateway, and
      no centrally enforced rate limits.
  - name: Operator Tuning
    description: Concurrency and throughput are governed by TiKV server configuration (gRPC concurrency,
      scheduler concurrency, regional placement) and by the client SDK and application-level rate limiting.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
