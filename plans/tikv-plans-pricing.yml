description: TiKV is an Apache 2.0 licensed, CNCF-graduated distributed transactional key-value store.
  It has no SaaS or commercial product surface — there is no rate card to reconcile. Customers consume
  TiKV by self-hosting (TiUP, Docker Compose, binaries, or building from source); commercial support
  is typically obtained via PingCAP's TiDB Cloud or Self-Managed offerings, which are tracked separately.
sources:
  - https://github.com/tikv/tikv
plans:
  - id: tikv-open-source
    name: TiKV (Open Source)
    type: freemium
    description: Self-hosted, Apache-2.0 licensed distributed key-value store. Free to download, deploy,
      and modify.
    entries:
      - label: Open Source
        name: open_source
        type: flat
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Apache 2.0 License
      - name: CNCF Graduated Project
      - name: Self-Hosted via TiUP, Docker, Kubernetes, or Source Build
